<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akun - Admin Portofolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/akun.css" />
</head>
<body>
  <div class="admin-layout">

    <aside class="sidebar">
      <div class="sidebar__logo">Admin Panel</div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link">🏠 Dashboard</a>
        <a href="profil.html" class="sidebar__link">📄 Profil</a>
        <a href="experience.html" class="sidebar__link">💼 Experience</a>
        <a href="projects.html" class="sidebar__link">📁 Projects</a>
        <a href="skills.html" class="sidebar__link">⭐ Skills</a>
        <a href="social.html" class="sidebar__link">🔗 Social Links</a>
        <a href="akun.html" class="sidebar__link sidebar__link--active">👤 Akun</a>
      </nav>
      <div class="sidebar__logout">
        <a href="#" id="logout-link" class="sidebar__link">↪ Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="main-content__header">
        <h1 class="main-content__title">Akun</h1>
      </div>

      <div class="card akun-card">
        <h2 class="card__section-title">Informasi Akun</h2>
        <div class="akun-info" id="akun-info">
          <p class="empty-state">Memuat data akun...</p>
        </div>
      </div>

      <div class="card akun-card" style="margin-top: 20px;">
        <h2 class="card__section-title">Ubah Username</h2>
        <form id="username-form" class="akun-form">
          <div class="form-group">
            <label for="username_baru">Username Baru</label>
            <input type="text" id="username_baru" placeholder="Username baru" required />
          </div>
          <button type="submit" class="btn btn--primary" id="username-submit">Simpan Username</button>
          <p class="status-text" id="username-status"></p>
        </form>
      </div>

      <div class="card akun-card" style="margin-top: 20px;">
        <h2 class="card__section-title">Ubah Password</h2>
        <form id="password-form" class="akun-form">
          <div class="form-group">
            <label for="password_lama">Password Lama</label>
            <input type="password" id="password_lama" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label for="password_baru">Password Baru</label>
            <input type="password" id="password_baru" placeholder="••••••••" required minlength="6" />
          </div>
          <button type="submit" class="btn btn--primary" id="password-submit">Simpan Password</button>
          <p class="status-text" id="password-status"></p>
        </form>
      </div>
    </main>
  </div>

  <script src="js/base.js"></script>
  <script src="js/akun.js"></script>
</body>
</html>
