<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills - Admin Portofolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/skills.css" />
</head>
<body>
  <div class="admin-layout">

    <aside class="sidebar">
      <div class="sidebar__logo">Admin Panel</div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link">🏠 Dashboard</a>
        <a href="profil.html" class="sidebar__link">📄 Profil</a>
        <a href="experience.html" class="sidebar__link">💼 Experience</a>
        <a href="projects.html" class="sidebar__link">📁 Projects</a>
        <a href="skills.html" class="sidebar__link sidebar__link--active">⭐ Skills</a>
        <a href="social.html" class="sidebar__link">🔗 Social Links</a>
        <a href="akun.html" class="sidebar__link">👤 Akun</a>
      </nav>
      <div class="sidebar__logout">
        <a href="#" id="logout-link" class="sidebar__link">↪ Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="main-content__header">
        <h1 class="main-content__title">Skills</h1>
        <button class="btn btn--primary" id="btn-add-skill">+ Tambah Skill</button>
      </div>

      <div class="skills-list" id="skills-list">
        <p class="empty-state">Memuat data skill...</p>
      </div>
    </main>
  </div>

  <!-- ================= MODAL FORM ================= -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <h2 class="modal__title" id="modal-title">Tambah Skill</h2>
      <form id="skill-form">
        <input type="hidden" id="skill-id" />
        <div class="form-group">
          <label for="nama_skill">Nama Skill</label>
          <input type="text" id="nama_skill" placeholder="Contoh: Python" required />
        </div>
        <div class="form-group">
          <label for="kategori">Kategori</label>
          <select id="kategori">
            <option value="Frontend">Frontend</option>
            <option value="Backend">Backend</option>
            <option value="Database">Database</option>
            <option value="Tools">Tools</option>
            <option value="Design">Design</option>
            <option value="Soft Skill">Soft Skill</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        <div class="form-group">
          <label for="level">Level Kemahiran: <span id="level-display">70</span>%</label>
          <input type="range" id="level" min="0" max="100" step="5" value="70" />
        </div>
        <div class="form-group">
          <label for="deskripsi">Catatan (opsional)</label>
          <input type="text" id="deskripsi" placeholder="Contoh: 2 tahun pengalaman" />
        </div>
        <div class="form-group">
          <label for="icon_class">Icon Class (opsional)</label>
          <input type="text" id="icon_class" placeholder="Contoh: fa-brands fa-python" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn--primary" id="skill-submit">Simpan</button>
          <button type="button" class="btn btn--ghost" id="btn-cancel">Batal</button>
        </div>
        <p class="status-text" id="skill-status"></p>
      </form>
    </div>
  </div>

  <script src="js/base.js"></script>
  <script src="js/skills.js"></script>
</body>
</html>
